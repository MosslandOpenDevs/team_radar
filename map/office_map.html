}

function withAlpha(rgba, a) {
  return rgba.replace(/[\d.]+\)$/, a + ')');
}
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);

}

  gif_camera_l: './assets/gif/animated_security_camera_left_48x48.gif?v=2',
  gif_camera_r: './assets/gif/animated_security_camera_right_48x48.gif?v=2',
  gif_fridge:   './assets/gif/animated_canteen_fridge_empty_48x48.gif?v=2',
  gif_coffee:   './assets/gif/animated_coffee_48x48.gif?v=2',
  gif_door:     './assets/gif/animated_door_glass_sliding_48x48.gif?v=2',
  gif_elevator: './assets/gif/animated_elevator_door_exit_48x48.gif?v=2',
};
let loaded = 0;
const total = Object.keys(FILES).length;
Object.entries(FILES).forEach(([k, src]) => {
  IMGS[k] = new Image();
  IMGS[k].onload  = () => { loaded++; if (loaded >= total) render(); };
  IMGS[k].onerror = () => { loaded++; if (loaded >= total) render(); };
  IMGS[k].src = src;
});

/* ══════════════════════════════════════════════════════════════════════
   RENDER PIPELINE
══════════════════════════════════════════════════════════════════════ */
function render() {
  document.getElementById('status').textContent =
    `RENDERED · GIF ${GIF_OBJECTS.length}개 배치됨 · 구역 클릭 시 상세 정보 표시`;

  const canvas = document.getElementById('map');
  const ctx    = canvas.getContext('2d');
  canvas.width  = GRID_W * PT;
  canvas.height = GRID_H * PT;
  ctx.imageSmoothingEnabled = false;
  hits.length = 0;

  // L0 — dark base
  ctx.fillStyle = '#141220';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // L1 — floor zones
  renderFloor(ctx);

  // L2 — walls + doors
  renderWalls(ctx);

  // L4 — selected zone highlight (below furniture)
  renderSelectedHighlight(ctx);

  // L5/6 — furniture & props
  renderObjects(ctx, 3);
  renderObjects(ctx, 4);

  // sync DOM GIF layer (browser-native GIF animation)
  syncGifLayer();

  // L8 — functional areas (attendance/remote/leave/lunch/break)
  renderFunctionalAreas(ctx);

  // L9 — zone labels
  renderLabels(ctx);

  // L10 — grid
  renderGrid(ctx);

  // L11 — vignette
  renderVignette(ctx);
}

/* ── FLOOR ───────────────────────────────────────────────────────────── */
function renderFloor(ctx) {
  const floorImg = IMGS.floors;
  const ok = floorImg && floorImg.complete && floorImg.naturalWidth > 0;

  for (const z of ZONES) {
    const ft = FLOOR[z.floor];
    for (let ty = 0; ty < z.h; ty++) {
      for (let tx = 0; tx < z.w; tx++) {
        const mapTX = z.x + tx, mapTY = z.y + ty;
        const dx = mapTX * PT, dy = mapTY * PT;
        if (ok && ft) {
          const subX = (mapTX % 4) * 16;
          const subY = (mapTY % 4) * 16;
          ctx.drawImage(floorImg, ft.sx + subX, ft.sy + subY, 16, 16,
                        dx, dy, PT, PT);
        } else {
          ctx.fillStyle = withAlpha(z.color, 0.45);
          ctx.fillRect(dx, dy, PT, PT);
        }
      }
    }
    // Zone colour overlay
    ctx.fillStyle = z.color;
    ctx.fillRect(z.x * PT, z.y * PT, z.w * PT, z.h * PT);
  }
}

/* ── ZONE BORDERS (colored glow at zone edges) ───────────────────────── */
function renderZoneBorders(ctx) {
  for (const z of ZONES) {
    const px = z.x * PT, py = z.y * PT;
    const pw = z.w * PT, ph = z.h * PT;
    // Soft outer glow
    ctx.strokeStyle = withAlpha(z.color, 0.45);
    ctx.lineWidth = 7;
    ctx.strokeRect(px + 4, py + 4, pw - 8, ph - 8);
    // Crisp inner line
    ctx.strokeStyle = withAlpha(z.color, 0.65);
    ctx.lineWidth = 1.5;
    ctx.strokeRect(px + 1, py + 1, pw - 2, ph - 2);
  }
}

/* ── WALLS ───────────────────────────────────────────────────────────── */
function renderWalls(ctx) {
  const wallImg = IMGS.walls;
  const wallOk  = wallImg && wallImg.complete && wallImg.naturalWidth > 0;
  const floorImg = IMGS.floors;
  const floorOk  = floorImg && floorImg.complete && floorImg.naturalWidth > 0;

  // Build door set for quick lookup
  const doorSet = new Set(DOORS.map(d => `${d.x},${d.y}`));

  // --- Fill all wall regions ---
  for (const w of WALLS) {
    const isPerimeter = (w.x === 0 || w.y === 0 ||
                         w.x + w.w === GRID_W || w.y + w.h === GRID_H);
    ctx.fillStyle = isPerimeter ? '#111020' : '#1a1828';
    for (let dy = 0; dy < w.h; dy++) {
      for (let dx = 0; dx < w.w; dx++) {
        const tileX = w.x + dx, tileY = w.y + dy;
        if (doorSet.has(`${tileX},${tileY}`)) continue; // skip door tiles
        ctx.fillRect(tileX * PT, tileY * PT, PT, PT);
      }
    }
  }

  // --- Wall texture on perimeter ---
  if (wallOk) {
    for (let tx = 1; tx < GRID_W - 1; tx++) {
      if (!doorSet.has(`${tx},0`))
        ctx.drawImage(wallImg, 0, 0, 16, 16, tx * PT, 0, PT, PT);
    }
  }

  // --- Render door openings ---
  for (const d of DOORS) {
    const dx = d.x * PT, dy = d.y * PT;
    // Find adjacent zone floor color
    ctx.fillStyle = '#252438';
    ctx.fillRect(dx, dy, PT, PT);
    // Door frame
    ctx.strokeStyle = 'rgba(110, 120, 180, 0.30)';
    ctx.lineWidth = 1;
    ctx.strokeRect(dx + 2, dy + 2, PT - 4, PT - 4);
    // Center dot (door handle suggestion)
    ctx.fillStyle = 'rgba(120, 130, 200, 0.25)';
    ctx.fillRect(dx + PT / 2 - 2, dy + PT / 2 - 2, 4, 4);
  }

  // --- Inner divider highlight lines ---
  const DIVIDERS = [
    [18,  1, 18, 13],   // Engineering ↔ Meeting
    [ 1, 13, 31, 13],   // Upper ↔ Lower
    [25, 14, 25, 24],   // Lounge ↔ Storage
    [31,  1, 31, 24],   // COLLAB boundary
  ];
  ctx.strokeStyle = 'rgba(70, 80, 140, 0.55)';
  ctx.lineWidth = 1;
  for (const [x1, y1, x2, y2] of DIVIDERS) {
    ctx.beginPath();
    ctx.moveTo(x1 * PT + 0.5, y1 * PT + 0.5);
    ctx.lineTo(x2 * PT + 0.5, y2 * PT + 0.5);
    ctx.stroke();
  }

  // --- T-junction / corner accents ---
  ctx.fillStyle = 'rgba(80, 90, 150, 0.4)';
  [[18,13],[31,13],[25,24],[31,24]].forEach(([x, y]) => {
    ctx.fillRect(x * PT - 1, y * PT - 1, 4, 4);
  });
}

/* ── SELECTED ZONE HIGHLIGHT ─────────────────────────────────────────── */
function renderSelectedHighlight(ctx) {
  if (!selectedZone) return;
  const z = ZONES.find(z => z.id === selectedZone);
  if (!z) return;
  ctx.fillStyle = withAlpha(z.color, 0.28);
  ctx.fillRect(z.x * PT, z.y * PT, z.w * PT, z.h * PT);
  ctx.strokeStyle = withAlpha(z.color, 0.80);
  ctx.lineWidth = 2;
  ctx.strokeRect(z.x * PT + 1, z.y * PT + 1, z.w * PT - 2, z.h * PT - 2);
}

/* ── OBJECTS ─────────────────────────────────────────────────────────── */
function renderObjects(ctx, layer) {
  const list = OBJECTS.filter(o => o.layer === layer)
                      .sort((a, b) => a.ty - b.ty || a.tx - b.tx);
  for (const obj of list) {
    const img = IMGS[obj.ts];
    const dx  = obj.tx * PT;
    const dy  = obj.ty * PT;
    const dw  = obj.sw * SCALE;
    const dh  = obj.sh * SCALE;

    if (img && img.complete && img.naturalWidth > 0) {
      ctx.drawImage(img, obj.sx, obj.sy, obj.sw, obj.sh, dx, dy, dw, dh);
    } else {
      ctx.fillStyle = layer === 3 ? 'rgba(80,60,40,0.7)' : 'rgba(60,80,100,0.7)';
      ctx.fillRect(dx + 2, dy + 2, dw - 4, dh - 4);
      ctx.strokeStyle = '#444';
      ctx.lineWidth = 1;
      ctx.strokeRect(dx + 2, dy + 2, dw - 4, dh - 4);
    }
    hits.push({name: obj.name, zone: obj.zone, x: dx, y: dy, w: dw, h: dh});
  }
}

/* ── GIF OBJECTS (DOM layer for reliable animation) ─────────────────── */
function syncGifLayer() {
  const layer = document.getElementById('gif-layer');
  if (!layer) return;

  layer.style.width = (GRID_W * PT) + 'px';
  layer.style.height = (GRID_H * PT) + 'px';

  if (layer.childElementCount !== GIF_OBJECTS.length) {
    layer.innerHTML = '';
    for (const obj of GIF_OBJECTS) {
      const el = document.createElement('img');
      el.className = 'gif-obj';
      el.alt = obj.name;
      el.src = FILES[obj.key] || '';
      layer.appendChild(el);
    }
  }

  const els = layer.querySelectorAll('.gif-obj');
  GIF_OBJECTS.forEach((obj, i) => {
    const el = els[i];
    if (!el) return;
    const dx = obj.tx * PT;
    const dy = obj.ty * PT;
    const dw = (obj.w || 1) * PT;
    const dh = (obj.h || 1) * PT;
    el.style.left = dx + 'px';
    el.style.top = dy + 'px';
    el.style.width = dw + 'px';
    el.style.height = dh + 'px';
    hits.push({name: obj.name, zone: obj.zone, x: dx, y: dy, w: dw, h: dh});
  });
}

/* ── FUNCTIONAL AREAS ───────────────────────────────────────────────── */
function renderFunctionalAreas(ctx) {
  ctx.save();
  ctx.font = 'bold 8px "Courier New", monospace';
  ctx.textAlign = 'left';

  for (const a of FUNCTION_AREAS) {
    const px = a.x * PT;
    const py = a.y * PT;
    const pw = a.w * PT;
    const ph = a.h * PT;

    // subtle area fill
    ctx.fillStyle = a.color;
    roundRect(ctx, px + 2, py + 2, pw - 4, ph - 4, 4);
    ctx.fill();

    // border
    ctx.strokeStyle = withAlpha(a.color, 0.85);
    ctx.lineWidth = 1;
    ctx.strokeRect(px + 1.5, py + 1.5, pw - 3, ph - 3);

    // label badge
    const labelW = ctx.measureText(a.label).width;
    ctx.fillStyle = 'rgba(8,10,18,0.85)';
    roundRect(ctx, px + 4, py + 4, labelW + 8, 12, 2);
    ctx.fill();
    ctx.fillStyle = '#d2ddff';
    ctx.fillText(a.label, px + 8, py + 13);
  }
  ctx.restore();
}

/* ── ZONE LABELS (with badge background) ─────────────────────────────── */
function renderLabels(ctx) {
  ctx.font = 'bold 9px "Courier New", monospace';
  ctx.textAlign = 'left';

  for (const l of LABELS) {
    const px = l.tx * PT + 5;
    const py = l.ty * PT + 13;
    const tw = ctx.measureText(l.text).width;

    // Badge background
    ctx.fillStyle = 'rgba(6,5,16,0.72)';
    roundRect(ctx, px - 4, py - 10, tw + 8, 14, 2);
    ctx.fill();

    // Text shadow
    ctx.fillStyle = 'rgba(0,0,0,0.9)';
    ctx.fillText(l.text, px + 1, py + 1);
    // Text
    ctx.fillStyle = l.col;
    ctx.fillText(l.text, px, py);
  }
}

/* ── GRID (major lines every 5 tiles) ───────────────────────────────── */
function renderGrid(ctx) {
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= GRID_W; x++) {
    ctx.strokeStyle = x % 5 === 0
      ? 'rgba(255,255,255,0.055)'
      : 'rgba(255,255,255,0.025)';
    ctx.beginPath();
    ctx.moveTo(x * PT, 0);
    ctx.lineTo(x * PT, GRID_H * PT);
    ctx.stroke();
  }
  for (let y = 0; y <= GRID_H; y++) {
    ctx.strokeStyle = y % 5 === 0
      ? 'rgba(255,255,255,0.055)'
      : 'rgba(255,255,255,0.025)';
    ctx.beginPath();
    ctx.moveTo(0, y * PT);
    ctx.lineTo(GRID_W * PT, y * PT);
    ctx.stroke();
  }
}

/* ── VIGNETTE ────────────────────────────────────────────────────────── */
function renderVignette(ctx) {
  const canvas = document.getElementById('map');
  const cx = canvas.width / 2, cy = canvas.height / 2;
  const r0 = Math.min(cx, cy) * 0.5;
  const r1 = Math.max(cx, cy) * 1.1;
  const grd = ctx.createRadialGradient(cx, cy, r0, cx, cy, r1);
  grd.addColorStop(0, 'rgba(0,0,0,0)');
  grd.addColorStop(1, 'rgba(0,0,0,0.38)');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

/* ── TOOLTIP ─────────────────────────────────────────────────────────── */
const tooltip = document.getElementById('tooltip');
const mapWrap = document.getElementById('map-wrap');

mapWrap.addEventListener('mousemove', e => {
  const rect = document.getElementById('map').getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  // Find hovered object
  let found = null;
  for (let i = hits.length - 1; i >= 0; i--) {
    const h = hits[i];
    if (mx >= h.x && mx < h.x + h.w && my >= h.y && my < h.y + h.h) {
      found = h;
      break;
    }
  }

  // Find hovered zone
  const tileX = Math.floor(mx / PT), tileY = Math.floor(my / PT);
  let hoveredZone = null;
  for (const z of ZONES) {
    if (tileX >= z.x && tileX < z.x + z.w &&
        tileY >= z.y && tileY < z.y + z.h) {
      hoveredZone = z;
      break;
    }
  }

  let hoveredArea = null;
  for (const a of FUNCTION_AREAS) {
    if (tileX >= a.x && tileX < a.x + a.w &&
        tileY >= a.y && tileY < a.y + a.h) {
      hoveredArea = a;
      break;
    }
  }

  if (found || hoveredArea || hoveredZone) {
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top  = (e.clientY - 6)  + 'px';

    const zoneName = found
      ? (ZONES.find(z => z.id === found.zone)?.label || '')
      : (hoveredArea ? hoveredArea.label : (hoveredZone?.label || ''));
    document.getElementById('tip-zone').textContent = zoneName;
    document.getElementById('tip-obj').textContent = found
      ? found.name
      : (hoveredArea ? hoveredArea.desc : '클릭하여 구역 정보 보기');
    mapWrap.style.cursor = 'pointer';
  } else {
    tooltip.style.display = 'none';
    mapWrap.style.cursor  = 'default';
  }
});

mapWrap.addEventListener('mouseleave', () => {
  tooltip.style.display = 'none';
});

/* ── CLICK: zone select ──────────────────────────────────────────────── */
document.getElementById('map').addEventListener('click', e => {
  const rect = e.target.getBoundingClientRect();
  const tileX = Math.floor((e.clientX - rect.left) / PT);
  const tileY = Math.floor((e.clientY - rect.top)  / PT);

  let clicked = null;
  for (const z of ZONES) {
    if (tileX >= z.x && tileX < z.x + z.w &&
        tileY >= z.y && tileY < z.y + z.h) {
      clicked = z.id;
      break;
    }
  }

  selectedZone = (clicked === selectedZone) ? null : clicked;
  render();
  updateInfoPanel();
  updateLegendActive();
});

/* ── LEGEND CLICK ────────────────────────────────────────────────────── */
document.querySelectorAll('.leg').forEach(el => {
  el.addEventListener('click', () => {
    const zid = el.dataset.zone;
    selectedZone = (selectedZone === zid) ? null : zid;
    render();
    updateInfoPanel();
    updateLegendActive();
  });
});

/* ── INFO PANEL ──────────────────────────────────────────────────────── */
function updateInfoPanel() {
  const panel = document.getElementById('info-panel');
  if (!selectedZone) {
    panel.style.display = 'none';
    return;
  }
  const z    = ZONES.find(z => z.id === selectedZone);
  const info = ZONE_INFO[selectedZone];
  document.getElementById('info-name').textContent =
    '◈  ' + z.label;
  document.getElementById('info-desc').textContent = info.desc;
  document.getElementById('info-objects').innerHTML =
    info.items.map(i => `· ${i}`).join('&nbsp;&nbsp;&nbsp;');
  // Tint border to zone color
  panel.style.borderLeftColor = withAlpha(z.color, 0.9)
    .replace('rgba', 'rgb').replace(/,\s*[\d.]+\)/, ')');
  panel.style.display = 'block';
}

function updateLegendActive() {
  document.querySelectorAll('.leg').forEach(el => {
    el.classList.toggle('active', el.dataset.zone === selectedZone);
  });
}
</script>
